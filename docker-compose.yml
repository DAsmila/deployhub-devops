version: "3.8"

services:
  frontend:
    build: ./frontend
    container_name: deployhub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - deployhub-net

  backend:
    build: ./backend
    container_name: deployhub-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskdb
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - deployhub-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:6
    container_name: deployhub-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - deployhub-net

volumes:
  mongo-data:

networks:
  deployhub-net:
    driver: bridge
