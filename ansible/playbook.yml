---
# ============================================================
# Ansible Playbook: Deploy TaskOps on remote server
# Usage: ansible-playbook -i inventory.ini playbook.yml
# ============================================================

- name: Deploy TaskOps Application
  hosts: taskops_servers
  become: yes
  vars:
    app_dir: /home/ubuntu/devops-project
    repo_url: "https://github.com/YOUR_USERNAME/devops-project.git"

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - git
          - curl
          - python3-pip
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Clone project repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        force: yes

    - name: Stop existing containers
      command: docker-compose down --remove-orphans
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: yes

    - name: Build and start containers
      command: docker-compose up -d --build
      args:
        chdir: "{{ app_dir }}"

    - name: Wait for backend to be ready
      uri:
        url: "http://localhost:5000/health"
        method: GET
        status_code: 200
      register: result
      until: result.status == 200
      retries: 10
      delay: 5

    - name: Show running containers
      command: docker ps
      register: docker_ps

    - name: Print container status
      debug:
        msg: "{{ docker_ps.stdout_lines }}"

    - name: Print app URL
      debug:
        msg: "App running at: http://{{ ansible_host }}"
